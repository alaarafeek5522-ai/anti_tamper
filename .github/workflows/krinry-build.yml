name: krinry Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options: [debug, release]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'

      - run: flutter pub get

      - name: Create android folder
        run: |
          cp -r android android_backup 2>/dev/null || true
          flutter create --platforms android --org com.alaa .
          cp -r android_backup/. android/ 2>/dev/null || true

      - name: Fix package name
        run: |
          find android -name "*.kt" -exec sed -i 's/com\.example\.anti_tamper/com.alaa.anti_tamper/g' {} \;
          find android -name "*.xml" -exec sed -i 's/com\.example\.anti_tamper/com.alaa.anti_tamper/g' {} \;
          find android -name "*.gradle" -exec sed -i 's/com\.example\.anti_tamper/com.alaa.anti_tamper/g' {} \;

      - name: Build APK
        run: flutter build apk --${{ github.event.inputs.build_type }} --target-platform android-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: anti-tamper-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7
